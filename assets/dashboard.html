<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lsman — LSI agent</title>
<style>
  :root {
    --green: #1aff80; --dim: #0e9950; --dark: #063b20;
    --bg: #050d08; --panel: #081710; --warn: #ffd24d; --err: #ff5c5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--green);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 14px; line-height: 1.45;
  }
  body::after { /* faint CRT scanlines */
    content: ""; pointer-events: none; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
  }
  header {
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    padding: 14px 20px 10px; border-bottom: 1px solid var(--dark);
  }
  header h1 { margin: 0; font-size: 18px; letter-spacing: 2px; text-shadow: 0 0 8px rgba(26,255,128,.5); }
  header .meta { color: var(--dim); }
  nav { display: flex; gap: 4px; padding: 8px 20px 0; border-bottom: 1px solid var(--dark); }
  nav button {
    background: none; border: 1px solid var(--dark); border-bottom: none;
    color: var(--dim); font: inherit; padding: 6px 18px; cursor: pointer;
    border-radius: 6px 6px 0 0; letter-spacing: 1px;
  }
  nav button.active { color: var(--green); background: var(--panel); border-color: var(--dim); }
  main { padding: 16px 20px 40px; max-width: 1200px; }
  section { display: none; }
  section.active { display: block; }
  .cards { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .card {
    background: var(--panel); border: 1px solid var(--dark); border-radius: 6px;
    padding: 10px 16px; min-width: 170px;
  }
  .card .k { color: var(--dim); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .card .v { font-size: 17px; margin-top: 2px; }
  .ok { color: var(--green); } .warn { color: var(--warn); } .err { color: var(--err); }
  table { border-collapse: collapse; width: 100%; margin: 8px 0 20px; }
  th, td { text-align: left; padding: 4px 12px 4px 0; border-bottom: 1px solid var(--dark); vertical-align: top; }
  th { color: var(--dim); font-weight: normal; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
  h2 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin: 18px 0 6px; }
  pre {
    background: var(--panel); border: 1px solid var(--dark); border-radius: 6px;
    padding: 10px; overflow-x: auto; white-space: pre; font-size: 12.5px;
  }
  pre .errline { color: var(--err); }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 6px 0 10px; }
  select, button.act, input[type=number] {
    background: var(--panel); color: var(--green); border: 1px solid var(--dim);
    border-radius: 4px; font: inherit; padding: 4px 8px;
  }
  button.act { cursor: pointer; } button.act:hover { background: var(--dark); }
  label { color: var(--dim); }
  details { margin: 4px 0; } summary { cursor: pointer; color: var(--dim); }
  .muted { color: var(--dim); }
  #banner { padding: 6px 20px; color: var(--warn); display: none; border-bottom: 1px solid var(--dark); }
</style>
</head>
<body>
<header>
  <h1>LSMAN // LSI AGENT</h1>
  <span class="meta" id="host">connecting…</span>
  <span class="meta" id="generated"></span>
</header>
<div id="banner"></div>
<nav>
  <button data-tab="overview" class="active">Overview</button>
  <button data-tab="errors">Errors</button>
  <button data-tab="logs">Logs</button>
  <button data-tab="network">Network</button>
  <button data-tab="crashes">Crashes</button>
</nav>
<main>
  <section id="overview" class="active">
    <div class="cards" id="cards"></div>
    <h2>Install</h2>
    <table id="install"></table>
    <h2>Logs <span class="muted">(timestamps inside logs are UTC)</span></h2>
    <table id="logfresh"></table>
  </section>

  <section id="errors">
    <div class="controls">
      <label>window</label>
      <select id="since">
        <option value="1h">last 1h</option>
        <option value="6h">last 6h</option>
        <option value="24h" selected>last 24h</option>
        <option value="7d">last 7d</option>
        <option value="all">whole logs</option>
      </select>
      <button class="act" id="rescan">rescan</button>
      <span class="muted" id="errsummary"></span>
    </div>
    <div class="muted">grouped by source site — <code>&lt;file&gt;(&lt;line&gt;)</code> points into the agent source; resolve with <code>lsman where "&lt;site&gt;"</code></div>
    <table id="errtable"></table>
    <div id="errsamples"></div>
  </section>

  <section id="logs">
    <div class="controls">
      <select id="logname"></select>
      <label>lines</label>
      <select id="loglines">
        <option>100</option><option selected>200</option><option>500</option><option>1000</option>
      </select>
      <label><input type="checkbox" id="logerrs"> errors only</label>
      <label><input type="checkbox" id="logauto" checked> auto-refresh</label>
      <button class="act" id="logreload">reload</button>
      <span class="muted" id="loginfo"></span>
    </div>
    <pre id="logview">select a log…</pre>
  </section>

  <section id="network">
    <table id="nettable"></table>
    <div class="muted" id="netnote"></div>
  </section>

  <section id="crashes">
    <table id="crashtable"></table>
  </section>
</main>

<script>
"use strict";
const $ = id => document.getElementById(id);
let snap = null;
let activeTab = "overview";

document.querySelectorAll("nav button").forEach(btn => {
  btn.onclick = () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll("nav button").forEach(b => b.classList.toggle("active", b === btn));
    document.querySelectorAll("main section").forEach(s => s.classList.toggle("active", s.id === activeTab));
    if (activeTab === "logs") loadLog();
    if (activeTab === "errors" && !$("errtable").innerHTML) scanErrors();
  };
});

const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtBytes = b => b < 1024 ? b + " B" : b < 1048576 ? (b/1024).toFixed(1) + " KB"
  : b < 1073741824 ? (b/1048576).toFixed(1) + " MB" : (b/1073741824).toFixed(1) + " GB";
const fmtAgo = s => s == null ? "?" : s < 60 ? s + "s ago" : s < 3600 ? Math.floor(s/60) + "m ago"
  : s < 86400 ? Math.floor(s/3600) + "h " + Math.floor(s%3600/60) + "m ago" : Math.floor(s/86400) + "d ago";
const fmtDur = s => s < 3600 ? Math.floor(s/60) + "m" : s < 86400 ? Math.floor(s/3600) + "h " + Math.floor(s%3600/60) + "m"
  : Math.floor(s/86400) + "d " + Math.floor(s%86400/3600) + "h";

async function refreshSnapshot() {
  try {
    const r = await fetch("/api/snapshot");
    snap = await r.json();
  } catch (e) {
    $("host").textContent = "connection lost — is lsman serve still running?";
    return;
  }
  $("host").textContent = snap.hostname + " (" + snap.platform + ")";
  $("generated").textContent = snap.generated_utc;
  const banner = $("banner");
  if (!snap.running_as_root) {
    banner.style.display = "block";
    banner.textContent = "not running as root — daemon stats, sockets and some logs are unavailable; restart with: sudo lsman serve";
  } else banner.style.display = "none";
  renderOverview(); renderNetwork(); renderCrashes();
}

function card(k, v, cls) { return `<div class="card"><div class="k">${k}</div><div class="v ${cls||""}">${v}</div></div>`; }

function renderOverview() {
  const d = snap.daemon;
  const stateCls = d.state === "Running" ? "ok" : "err";
  let cards = card("daemon", esc(d.state) + (d.pid ? ` <span class="muted">pid ${d.pid}</span>` : ""), stateCls);
  if (d.pid && d.stats_available) {
    cards += card("cpu", d.cpu_percent.toFixed(1) + "%");
    cards += card("memory", fmtBytes(d.memory_kb * 1024));
    cards += card("uptime", d.uptime_seconds ? fmtDur(d.uptime_seconds) : "unknown");
    cards += card("open files", d.open_files);
  } else if (d.pid) {
    cards += card("cpu / mem", "needs sudo", "warn");
  }
  const up = snap.uplink;
  cards += !up.available
    ? card("uplink", up.error ? esc(up.error) : "needs sudo", "warn")
    : up.established.length
      ? card("uplink", up.established.map(c => esc(c.remote)).join("<br>"), "ok")
      : card("uplink", "no established connections", "err");
  const cfg = snap.config;
  cards += card("trace level", cfg.trace_level != null
    ? cfg.trace_level + " (" + esc(cfg.trace_level_name) + ")"
    : (cfg.read_error ? "unreadable" : "default (3/info)"), cfg.trace_level >= 4 ? "warn" : "");
  cards += card("crash reports", snap.crashes.length, snap.crashes.length ? "err" : "ok");
  $("cards").innerHTML = cards;

  const rows = [["binary", snap.binary], ["base dir", snap.base_dir], ["config", cfg.file], ["database", snap.database]]
    .map(([k, f]) => `<tr><td class="muted">${k}</td><td>${esc(f.path)}</td><td>${f.exists ? (f.is_dir ? "dir" : fmtBytes(f.size_bytes)) : '<span class="err">missing</span>'}</td><td>${f.exists ? fmtAgo(f.modified_secs_ago) : ""}</td></tr>`);
  $("install").innerHTML = "<tr><th></th><th>path</th><th>size</th><th>modified</th></tr>" + rows.join("");

  $("logfresh").innerHTML = "<tr><th>log</th><th>size</th><th>last written</th><th></th></tr>" +
    snap.logs.map(l => `<tr><td>${esc(l.name)}</td><td>${l.file.exists ? fmtBytes(l.file.size_bytes) : '<span class="muted">missing</span>'}</td><td>${l.file.exists ? fmtAgo(l.file.modified_secs_ago) : ""}</td><td class="muted">${esc(l.description)}</td></tr>`).join("");

  const sel = $("logname");
  const cur = sel.value;
  sel.innerHTML = snap.logs.filter(l => l.file.exists).map(l => `<option>${esc(l.name)}</option>`).join("");
  if (cur && [...sel.options].some(o => o.value === cur)) sel.value = cur;
}

function renderNetwork() {
  const up = snap.uplink;
  if (!up.available) {
    $("nettable").innerHTML = "";
    $("netnote").textContent = up.error || "socket data unavailable — run with sudo";
    return;
  }
  $("netnote").textContent = up.total_sockets + " open sockets; established connections shown (uplink to master)";
  $("nettable").innerHTML = "<tr><th>local</th><th>remote</th><th>state</th></tr>" +
    up.established.map(c => `<tr><td>${esc(c.local)}</td><td>${esc(c.remote)}</td><td class="ok">ESTABLISHED</td></tr>`).join("");
}

function renderCrashes() {
  $("crashtable").innerHTML = "<tr><th>modified</th><th>report</th></tr>" +
    (snap.crashes.length
      ? snap.crashes.map(c => `<tr><td>${esc(c.modified)}</td><td>${esc(c.path)}</td></tr>`).join("")
      : '<tr><td colspan="2" class="muted">none found' + (snap.running_as_root ? "" : " (daemon reports may need sudo)") + "</td></tr>");
}

async function scanErrors() {
  $("errsummary").textContent = "scanning…";
  const r = await fetch("/api/errors?since=" + $("since").value);
  const scan = await r.json();
  $("errsummary").textContent = scan.total_matches + " matching lines / " + scan.groups.length + " sites"
    + (scan.unreadable_logs.length ? " — unreadable: " + scan.unreadable_logs.join(", ") : "");
  $("errtable").innerHTML = scan.groups.length
    ? "<tr><th>log</th><th>site</th><th>count</th><th>first seen</th><th>last seen</th></tr>" +
      scan.groups.map(g => `<tr><td>${esc(g.log)}</td><td>${esc(g.site)}</td><td>${g.count}</td><td>${esc(g.first_seen||"-")}</td><td>${esc(g.last_seen||"-")}</td></tr>`).join("")
    : '<tr><td class="muted">no error/crash lines in this window</td></tr>';
  $("errsamples").innerHTML = scan.groups.map(g =>
    `<details><summary>${esc(g.site)} — most recent line</summary><pre>${esc(g.sample)}</pre></details>`).join("");
}
$("rescan").onclick = scanErrors;
$("since").onchange = scanErrors;

async function loadLog() {
  const name = $("logname").value;
  if (!name) return;
  const url = `/api/log?name=${encodeURIComponent(name)}&n=${$("loglines").value}&errors=${$("logerrs").checked ? 1 : 0}`;
  const r = await fetch(url);
  const data = await r.json();
  const view = $("logview");
  if (data.error) { view.textContent = data.error; $("loginfo").textContent = ""; return; }
  $("loginfo").textContent = fmtBytes(data.size_bytes) + (data.windowed ? " (showing last 1 MB window)" : "");
  const stick = view.scrollTop + view.clientHeight >= view.scrollHeight - 8;
  view.innerHTML = data.lines.map(l =>
    l.includes(" -E ") ? `<span class="errline">${esc(l)}</span>` : esc(l)).join("\n") || "(empty)";
  if (stick) view.scrollTop = view.scrollHeight;
}
$("logreload").onclick = loadLog;
$("logname").onchange = loadLog;
$("loglines").onchange = loadLog;
$("logerrs").onchange = loadLog;

refreshSnapshot();
setInterval(() => {
  if (activeTab === "overview" || activeTab === "network" || activeTab === "crashes") refreshSnapshot();
  if (activeTab === "logs" && $("logauto").checked) loadLog();
}, 3000);
</script>
</body>
</html>
