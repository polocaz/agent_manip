[package]
name = "agent_manip"
version = "0.1.0"
edition = "2021"

[dependencies]
# UI Framework
eframe = "0.24.1"         # egui framework for cross-platform GUI
egui = "0.24.1"          # immediate mode GUI library

# Database
rusqlite = { version = "0.30.0", features = ["bundled"] }  # SQLite wrapper
tokio = { version = "1.35.0", features = ["full"] }        # Async runtime

# Logging and file handling
log = "0.4.20"
env_logger = "0.10.1"
chrono = "0.4.31"
rfd = "0.12"

# Error handling
anyhow = "1.0.75"
thiserror = "1.0.50"

# Serialization
serde = { version = "1.0.193", features = ["derive"] }
serde_json = "1.0.108"

[build-dependencies]
cc = "1.0" 